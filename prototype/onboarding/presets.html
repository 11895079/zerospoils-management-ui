<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZeroSpoils - Prepared Food Presets</title>
  <link rel="stylesheet" href="onboarding.css">
</head>
<body>
  <div class="mobile-frame">
    <div class="onboarding-screen">
      <div class="onboarding-header">
        <a href="permissions.html" class="back-btn">← Back</a>
        <a href="../index.html" class="skip-btn">Skip →</a>
      </div>

      <div class="progress-indicator">🍲 7/7</div>

      <div class="onboarding-content">
        <h2>Save time with prepared food presets</h2>
        <p class="helper-text">We will remember how long your common dishes last in the fridge or freezer.</p>

        <div class="preset-grid">
          <label class="preset-card">
            <input type="checkbox" checked />
            <div>
              <div class="preset-name">🍚 Jollof rice</div>
              <div class="preset-detail">Fridge 4 days · Freezer 30 days</div>
            </div>
          </label>
          <label class="preset-card">
            <input type="checkbox" checked />
            <div>
              <div class="preset-name">🍛 Curry</div>
              <div class="preset-detail">Fridge 4 days · Freezer 90 days</div>
            </div>
          </label>
          <label class="preset-card">
            <input type="checkbox" />
            <div>
              <div class="preset-name">🥣 Soup</div>
              <div class="preset-detail">Fridge 4 days · Freezer 90 days</div>
            </div>
          </label>
          <label class="preset-card">
            <input type="checkbox" />
            <div>
              <div class="preset-name">🍝 Pasta dishes</div>
              <div class="preset-detail">Fridge 5 days · Freezer 60 days</div>
            </div>
          </label>
          <label class="preset-card">
            <input type="checkbox" />
            <div>
              <div class="preset-name">🍲 Stew (meat)</div>
              <div class="preset-detail">Fridge 4 days · Freezer 90 days</div>
            </div>
          </label>
          <label class="preset-card">
            <input type="checkbox" />
            <div>
              <div class="preset-name">🫘 Beans (cooked)</div>
              <div class="preset-detail">Fridge 5 days · Freezer 180 days</div>
            </div>
          </label>
        </div>

        <div class="info-box" style="margin-top:12px;">
          <p>We'll auto-fill expiry and storage location for prepared foods you pick here. You can edit these later in Settings.</p>
        </div>
      </div>

      <div class="final-actions">
        <a href="get-started.html" class="btn btn-primary">Save presets →</a>
        <a href="get-started.html" class="btn btn-text">Skip for now</a>
      </div>
    </div>
  </div>
</body>
</html>
