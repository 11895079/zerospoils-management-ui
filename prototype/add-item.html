<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZeroSpoils - Add Item</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="mobile-frame">
    <!-- Header -->
    <header class="app-header modal-header">
      <h1>Add Item</h1>
      <a href="index.html" class="close-btn">Close</a>
    </header>

    <!-- Form Content -->
    <div class="content form-content">
      <form class="add-item-form">
        <div class="form-group">
          <label for="name">Name *</label>
          <input type="text" id="name" placeholder="Milk" required />
           <div id="presetHelper" class="help-text" style="display:none;">Preset applied:</div>
           <div id="presetSuggestions" class="preset-suggestions" style="display:none;"></div>
        </div>

        <div class="form-group">
          <label for="category">Category *</label>
          <select id="category" required>
            <option value="">Select category...</option>
            <option value="dairy">🥛 Dairy</option>
            <option value="fruit">🍎 Fruit</option>
            <option value="veg">🥕 Vegetables</option>
            <option value="meat">🍗 Meat</option>
            <option value="bakery">🍞 Bakery</option>
            <option value="prepared">🍲 Prepared</option>
            <option value="other">📦 Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Type *</label>
          <div class="segmented">
            <label><input type="radio" name="type" id="typeRaw" value="raw" checked> Raw</label>
            <label><input type="radio" name="type" id="typePrepared" value="prepared"> Prepared (Cooked)</label>
          </div>
        </div>

        <div class="form-group" id="preparedDateGroup" style="display:none;">
          <label for="preparedDate">Prepared Date</label>
          <input type="date" id="preparedDate" />
        </div>

        <div class="form-group">
          <label for="location">Location *</label>
          <select id="location" required>
            <option value="">Select location...</option>
            <option value="fridge">❄️ Fridge</option>
            <option value="freezer">🧊 Freezer</option>
            <option value="pantry">🗄️ Pantry</option>
            <option value="counter">🏠 Counter</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" value="1" min="1" />
          </div>
          <div class="form-group">
            <label for="unit">Unit</label>
            <select id="unit">
              <option value="count">Count</option>
              <option value="liter">Liter</option>
              <option value="kg">Kg</option>
              <option value="g">g</option>
              <option value="lb">lb</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="price">Price Paid (optional) 💵</label>
          <input type="text" id="price" placeholder="$3.99" />
          <p class="help-text">Format: $3.99 or 3.99</p>
        </div>

        <div class="form-group">
          <label for="batch">Shopping Batch (optional)</label>
          <select id="batch">
            <option value="">No batch</option>
            <option value="costco-apr19">🛒 Costco · Apr 19, 2026</option>
            <option value="traderjoes-apr17">🛒 Trader Joe's · Apr 17, 2026</option>
            <option value="wholefoods-apr12">🛒 Whole Foods · Apr 12, 2026</option>
          </select>
          <p class="help-text">Link this item to a shopping trip for cost/waste tracking.</p>
        </div>

        <div class="form-group">
          <label for="expiry">Expiry Date *</label>
          <div class="date-input-group">
            <input type="date" id="expiry" required />
            <button type="button" class="camera-btn" title="Scan expiry date">📷</button>
          </div>
          <p class="help-text">Or scan the expiry date with camera</p>
        </div>

        <a href="index.html" class="btn btn-primary">Save Item</a>
        <a href="index.html" class="btn btn-text">Cancel</a>
      </form>
    </div>
  </div>

  <script>
    // Set default date to 7 days from now
    const today = new Date();
    today.setDate(today.getDate() + 7);
    const dateStr = today.toISOString().split('T')[0];
    document.getElementById('expiry').value = dateStr;

    // Camera button simulation
    document.querySelector('.camera-btn').addEventListener('click', function() {
      alert('📷 Camera OCR would open here\n\nIn the real app, this would:\n1. Open device camera\n2. Scan expiry date text\n3. Auto-fill the date field');
    });

    // Prepared toggle behavior
    const preparedGroup = document.getElementById('preparedDateGroup');
    const preparedDate = document.getElementById('preparedDate');
    const typeRaw = document.getElementById('typeRaw');
    const typePrepared = document.getElementById('typePrepared');
    const locationSel = document.getElementById('location');
    const expiryInput = document.getElementById('expiry');

    const todayISO = new Date().toISOString().split('T')[0];
    preparedDate.value = todayISO;

    function applyPreparedDefaults(isPrepared) {
      if (isPrepared) {
        preparedGroup.style.display = '';
        locationSel.value = 'freezer';
        const d = new Date(); d.setDate(d.getDate() + 30);
        expiryInput.value = d.toISOString().split('T')[0];
      } else {
        preparedGroup.style.display = 'none';
        locationSel.value = 'fridge';
        const d = new Date(); d.setDate(d.getDate() + 7);
        expiryInput.value = d.toISOString().split('T')[0];
      }
    }

    typePrepared.addEventListener('change', () => applyPreparedDefaults(true));
    typeRaw.addEventListener('change', () => applyPreparedDefaults(false));

    // Prepared presets (local stub; can point to external catalog or server cache later)
    const preparedPresets = [
      { name: 'Jollof rice', fridgeDays: 4, freezerDays: 30, recommended: 'fridge' },
      { name: 'Fried rice', fridgeDays: 4, freezerDays: 30, recommended: 'fridge' },
      { name: 'Curry', fridgeDays: 4, freezerDays: 90, recommended: 'fridge' },
      { name: 'Soup', fridgeDays: 4, freezerDays: 90, recommended: 'freezer' },
      { name: 'Stew (meat)', fridgeDays: 4, freezerDays: 90, recommended: 'fridge' },
      { name: 'Pasta dish', fridgeDays: 5, freezerDays: 60, recommended: 'fridge' },
      { name: 'Beans (cooked)', fridgeDays: 5, freezerDays: 180, recommended: 'freezer' },
      { name: 'Chili', fridgeDays: 4, freezerDays: 90, recommended: 'freezer' },
      { name: 'Lasagna', fridgeDays: 5, freezerDays: 90, recommended: 'fridge' }
    ];

    const nameInput = document.getElementById('name');
    const presetSuggestions = document.getElementById('presetSuggestions');
    const presetHelper = document.getElementById('presetHelper');
    const categorySel = document.getElementById('category');

    function isPreparedContext() {
      return categorySel.value === 'prepared' || typePrepared.checked;
    }

    function renderSuggestions(matches) {
      if (!matches.length || !isPreparedContext()) {
        presetSuggestions.style.display = 'none';
        return;
      }
      presetSuggestions.innerHTML = matches.map(m => `
        <button type="button" class="preset-suggestion" data-name="${m.name}">
          <div class="preset-suggestion-title">${m.name}</div>
          <div class="preset-suggestion-detail">Fridge ${m.fridgeDays}d · Freezer ${m.freezerDays}d</div>
        </button>
      `).join('');
      presetSuggestions.style.display = 'block';
    }

    function applyPreset(preset) {
      const preferred = locationSel.value || preset.recommended;
      if (preferred) {
        locationSel.value = preferred;
      }
      const days = locationSel.value === 'freezer' ? preset.freezerDays : preset.fridgeDays;
      if (days) {
        const d = new Date();
        d.setDate(d.getDate() + days);
        expiryInput.value = d.toISOString().split('T')[0];
        preparedDate.value = todayISO;
      }
      presetHelper.style.display = 'block';
      presetHelper.textContent = `Preset applied: ${preset.name} (${locationSel.value === 'freezer' ? preset.freezerDays : preset.fridgeDays} days)`;
      presetSuggestions.style.display = 'none';
      typePrepared.checked = true;
      applyPreparedDefaults(true);
    }

    nameInput.addEventListener('input', (e) => {
      if (!isPreparedContext()) {
        presetSuggestions.style.display = 'none';
        return;
      }
      const term = e.target.value.trim().toLowerCase();
      if (term.length < 2) {
        presetSuggestions.style.display = 'none';
        return;
      }
      const matches = preparedPresets.filter(p => p.name.toLowerCase().includes(term)).slice(0, 5);
      renderSuggestions(matches);
    });

    presetSuggestions.addEventListener('click', (e) => {
      const btn = e.target.closest('.preset-suggestion');
      if (!btn) return;
      const preset = preparedPresets.find(p => p.name === btn.dataset.name);
      if (preset) {
        nameInput.value = preset.name;
        applyPreset(preset);
      }
    });

    categorySel.addEventListener('change', () => {
      presetSuggestions.style.display = 'none';
    });
  </script>
</body>
</html>
