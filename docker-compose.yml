version: '3.8'

services:
  # Redis - for job queue and caching
  redis:
    image: redis:7-alpine
    container_name: zerospoils-mgmt-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  # Management API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: zerospoils-mgmt-api
    ports:
      - "3001:3001"
    environment:
      API_PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      APP_PROFILE: local
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-do-not-use-in-production
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    volumes:
      - ./api/src:/app/src

  # Background Worker
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: zerospoils-mgmt-worker
    ports:
      - "3002:3002"
    environment:
      WORKER_PORT: 3002
      APP_PROFILE: local
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      DUCKDB_PATH: /app/data/zerospoils_analytics.duckdb
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    volumes:
      - ./worker/src:/app/src
      - ./worker/data:/app/data

  # Frontend (development server)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zerospoils-mgmt-ui
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/public:/app/public
    command: npm run dev

volumes:
  redis_data:

networks:
  default:
    name: zerospoils-mgmt-network
