name: Flutter CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: |
          cat > pubspec_overrides.yaml <<'EOF'
          dependency_overrides:
            google_mlkit_text_recognition:
              path: tooling_stubs/google_mlkit_text_recognition
            google_mlkit_image_labeling:
              path: tooling_stubs/google_mlkit_image_labeling
          EOF
          flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed lib test tool integration_test scripts

      - name: Check hardcoded UI strings
        run: dart run tool/check_hardcoded_ui_strings.dart origin/main

      - name: Analyze
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
