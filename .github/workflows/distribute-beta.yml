name: Distribute Beta Build

# Triggered by version tags in the form v<major>.<minor>.<patch>-b<build>, e.g. v0.2.0-b26
# pubspec uses 0.2.0+N which produces CFBundleShortVersionString=0.2.0, CFBundleVersion=N
# Builds signed APK + IPA and distributes to beta testers.
on:
  push:
    tags:
      - 'v*-b[0-9]*'

jobs:
  # ---------------------------------------------------------------------------
  # Android — build signed APK and distribute
  # ---------------------------------------------------------------------------
  distribute-android:
    name: Distribute Android Beta
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git log release notes

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('app/android/**/*.gradle*', 'app/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Generate release notes
        id: notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --oneline "${PREV_TAG}..${TAG}")
          else
            NOTES=$(git log --oneline -20)
          fi
          # Firebase App Distribution release notes max 16384 chars
          NOTES_TRIMMED=$(echo "$NOTES" | head -c 16000)
          {
            echo "RELEASE_NOTES<<EOF"
            echo "$NOTES_TRIMMED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            if printf '%s' "$KEYSTORE_BASE64" | tr -d '\r\n\t ' | base64 --decode > /tmp/release-keystore.jks; then
              echo "KEYSTORE_AVAILABLE=true" >> "$GITHUB_ENV"
            else
              echo "Warning: ANDROID_KEYSTORE_BASE64 is invalid base64. APK will be debug-signed."
              echo "KEYSTORE_AVAILABLE=false" >> "$GITHUB_ENV"
            fi
          else
            echo "Warning: ANDROID_KEYSTORE_BASE64 not set. APK will be debug-signed."
            echo "KEYSTORE_AVAILABLE=false" >> "$GITHUB_ENV"
          fi

      # build.gradle.kts reads signing config from key.properties (rootProject path).
      # Write it here so Gradle picks up the decoded keystore automatically.
      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ "$KEYSTORE_AVAILABLE" != "true" ]; then
            echo "SIGNING_STATUS=missing_keystore" >> "$GITHUB_ENV"
            echo "SIGNING_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "SIGNING_STATUS=missing_secret" >> "$GITHUB_ENV"
            echo "SIGNING_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if ! keytool -list -keystore /tmp/release-keystore.jks -storepass "$KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "SIGNING_STATUS=bad_store_password" >> "$GITHUB_ENV"
            echo "SIGNING_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if ! keytool -list -keystore /tmp/release-keystore.jks -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null 2>&1; then
            echo "SIGNING_STATUS=bad_alias" >> "$GITHUB_ENV"
            echo "SIGNING_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi

          printf '%s\n' \
            "storeFile=/tmp/release-keystore.jks" \
            "storePassword=${KEYSTORE_PASSWORD}" \
            "keyAlias=${KEY_ALIAS}" \
            "keyPassword=${KEY_PASSWORD}" \
            > app/android/key.properties
          echo "SIGNING_STATUS=ready" >> "$GITHUB_ENV"
          echo "SIGNING_READY=true" >> "$GITHUB_ENV"

      - name: Validate Android signing
        run: |
          if [ "$SIGNING_READY" != "true" ]; then
            case "$SIGNING_STATUS" in
              missing_keystore)
                echo "::error::ANDROID_KEYSTORE_BASE64 is missing or invalid base64."
                ;;
              missing_secret)
                echo "::error::One or more Android signing secrets are empty: ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."
                ;;
              bad_store_password)
                echo "::error::ANDROID_KEYSTORE_PASSWORD does not unlock the uploaded keystore."
                ;;
              bad_alias)
                echo "::error::ANDROID_KEY_ALIAS was not found in the uploaded keystore (alias is case-sensitive)."
                ;;
              *)
                echo "::error::Android signing is not ready. Verify ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD."
                ;;
            esac
            exit 1
          fi

      - name: Build APK (beta flavour)
        working-directory: ./app
        env:
          GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
        timeout-minutes: 40
        run: |
          flutter build apk --release --dart-define=BETA_BUILD=true

      - name: Rename APK
        working-directory: ./app
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          mv build/app/outputs/flutter-apk/app-release.apk \
             "build/app/outputs/flutter-apk/zerospoils-${TAG_VERSION}-beta.apk"
          echo "APK_PATH=app/build/app/outputs/flutter-apk/zerospoils-${TAG_VERSION}-beta.apk" >> "$GITHUB_ENV"

      - name: Upload APK to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: beta-internal
          file: ${{ env.APK_PATH }}
          releaseNotes: ${{ steps.notes.outputs.RELEASE_NOTES }}

  # ---------------------------------------------------------------------------
  # iOS — build IPA and distribute
  # ---------------------------------------------------------------------------
  distribute-ios:
    name: Distribute iOS Beta
    runs-on: macos-26  # Xcode 26 / iOS 26 SDK required by App Store Connect
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Generate release notes
        id: notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --oneline "${PREV_TAG}..${TAG}")
          else
            NOTES=$(git log --oneline -20)
          fi
          NOTES_TRIMMED=$(echo "$NOTES" | head -c 16000)
          {
            echo "RELEASE_NOTES<<EOF"
            echo "$NOTES_TRIMMED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -n "$PROVISIONING_PROFILE_BASE64" ]; then
            PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
            if printf '%s' "$PROVISIONING_PROFILE_BASE64" | tr -d '\r\n\t ' | base64 --decode > "$PP_PATH"; then
              security cms -D -i "$PP_PATH" > "$RUNNER_TEMP/profile.plist"
              PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$RUNNER_TEMP/profile.plist")
              PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$RUNNER_TEMP/profile.plist")
              TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$RUNNER_TEMP/profile.plist")
              mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
              cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
              {
                echo "PROFILE_NAME=$PROFILE_NAME"
                echo "TEAM_ID=$TEAM_ID"
                echo "PROFILE_AVAILABLE=true"
              } >> "$GITHUB_ENV"
            else
              echo "Warning: IOS_PROVISIONING_PROFILE_BASE64 is invalid base64."
              echo "PROFILE_AVAILABLE=false" >> "$GITHUB_ENV"
            fi
          else
            echo "Warning: IOS_PROVISIONING_PROFILE_BASE64 not set."
            echo "PROFILE_AVAILABLE=false" >> "$GITHUB_ENV"
          fi

      - name: Install certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$CERTIFICATE_BASE64" ]; then
            CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

            if ! printf '%s' "$CERTIFICATE_BASE64" | tr -d '\r\n\t ' | base64 --decode > "$CERTIFICATE_PATH"; then
              echo "Warning: IOS_CERTIFICATE_BASE64 is invalid base64."
              echo "CERT_AVAILABLE=false" >> "$GITHUB_ENV"
              exit 0
            fi

            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

            if security import "$CERTIFICATE_PATH" \
              -P "$CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 \
              -k "$KEYCHAIN_PATH"; then
              # Import Apple WWDR G3 intermediate CA so the chain validates
              curl -fsSL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer \
                -o "$RUNNER_TEMP/AppleWWDRCAG3.cer"
              security import "$RUNNER_TEMP/AppleWWDRCAG3.cer" \
                -k "$KEYCHAIN_PATH" 2>/dev/null || true
              security list-keychain -d user -s "$KEYCHAIN_PATH"
              # Allow codesign/Xcode to access the private key without prompting
              security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" 2>/dev/null || true
              if security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -Eq 'Apple Distribution|iPhone Distribution'; then
                echo "CERT_AVAILABLE=true" >> "$GITHUB_ENV"
              else
                echo "Warning: Imported certificate has no usable code-signing identity/private key."
                echo "CERT_AVAILABLE=false" >> "$GITHUB_ENV"
              fi
            else
              echo "Warning: Certificate import failed. Verify IOS_CERTIFICATE_PASSWORD matches the .p12 export password."
              echo "CERT_AVAILABLE=false" >> "$GITHUB_ENV"
            fi
          else
            echo "Warning: IOS_CERTIFICATE_BASE64 not set."
            echo "CERT_AVAILABLE=false" >> "$GITHUB_ENV"
          fi

      - name: Build iOS IPA (beta flavour)
        id: build_ipa
        working-directory: ./app
        run: |
          if [ "$CERT_AVAILABLE" = "true" ] && [ "$PROFILE_AVAILABLE" = "true" ]; then
            # flutter build ipa produces a properly packaged signed IPA using
            # the installed certificate + provisioning profile. Output path:
            # build/ios/ipa/<AppName>.ipa
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
              '<plist version="1.0">' \
              '<dict>' \
              '  <key>method</key>' \
              '  <string>app-store</string>' \
              '  <key>signingStyle</key>' \
              '  <string>manual</string>' \
              '  <key>teamID</key>' \
              "  <string>${TEAM_ID}</string>" \
              '  <key>provisioningProfiles</key>' \
              '  <dict>' \
              '    <key>com.zerospoils.zerospoils</key>' \
              "    <string>${PROFILE_NAME}</string>" \
              '  </dict>' \
              '</dict>' \
              '</plist>' > "$RUNNER_TEMP/ExportOptions.plist"
            if flutter build ipa --release \
              --export-options-plist="$RUNNER_TEMP/ExportOptions.plist" \
              --dart-define=BETA_BUILD=true; then
              IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
              if [ -z "$IPA_FILE" ]; then
                echo "::error::Signed IPA build completed but no IPA artifact was found in build/ios/ipa."
                exit 1
              fi
              echo "IPA_PATH=app/${IPA_FILE}" >> "$GITHUB_ENV"
              echo "ipa_available=true" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Signed IPA build failed."
              exit 1
            fi
          else
            echo "::error::iOS signing inputs unavailable/invalid. Verify IOS_PROVISIONING_PROFILE_BASE64, IOS_CERTIFICATE_BASE64, and IOS_CERTIFICATE_PASSWORD."
            exit 1
          fi

      - name: Upload IPA to TestFlight
        if: steps.build_ipa.outputs.ipa_available == 'true'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          # altool discovers the .p8 key file automatically when placed in
          # ~/.appstoreconnect/private_keys/ named AuthKey_<KEYID>.p8
          mkdir -p ~/.appstoreconnect/private_keys
          API_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"

          # Upload to App Store Connect / TestFlight using Xcode's built-in altool
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID" \
            --verbose

          rm -f "$API_KEY_PATH"

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/app-signing.keychain-db" ]; then
            security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db"
          fi
