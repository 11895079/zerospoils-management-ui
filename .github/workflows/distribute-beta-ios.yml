name: Distribute iOS Beta

# Manual-only dispatch to avoid stale signing cert failures during CI tag runs.
# Use 'gh workflow run' or GitHub Actions UI to trigger.
on:
  workflow_dispatch:

concurrency:
  group: beta-distribute-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  distribute-ios:
    name: Distribute iOS Beta
    runs-on: macos-26  # Xcode 26 / iOS 26 SDK required by App Store Connect
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods
            app/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('app/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Get dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Generate release notes
        id: notes
        run: |
          REF_NAME=${GITHUB_REF#refs/*/}
          PREV_TAG=$(git describe --tags --abbrev=0 "${REF_NAME}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --oneline "${PREV_TAG}..${REF_NAME}")
          else
            NOTES=$(git log --oneline -20)
          fi
          NOTES_TRIMMED=$(echo "$NOTES" | head -c 16000)
          {
            echo "RELEASE_NOTES<<EOF"
            echo "$NOTES_TRIMMED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -n "$PROVISIONING_PROFILE_BASE64" ]; then
            PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
            if printf '%s' "$PROVISIONING_PROFILE_BASE64" | tr -d '\r\n\t ' | base64 --decode > "$PP_PATH"; then
              security cms -D -i "$PP_PATH" > "$RUNNER_TEMP/profile.plist"
              PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$RUNNER_TEMP/profile.plist")
              PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$RUNNER_TEMP/profile.plist")
              TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$RUNNER_TEMP/profile.plist")
              APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$RUNNER_TEMP/profile.plist")
              GET_TASK_ALLOW=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:get-task-allow' "$RUNNER_TEMP/profile.plist" 2>/dev/null || echo "unknown")
              BUNDLE_ID=${APP_IDENTIFIER#${TEAM_ID}.}
              mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
              cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

              if [ "$GET_TASK_ALLOW" = "true" ]; then
                echo "::error::Provided provisioning profile is a Development profile (get-task-allow=true). Use an App Store Distribution profile."
                echo "PROFILE_AVAILABLE=false" >> "$GITHUB_ENV"
                exit 1
              fi

              {
                echo "PROFILE_NAME=$PROFILE_NAME"
                echo "TEAM_ID=$TEAM_ID"
                echo "BUNDLE_ID=$BUNDLE_ID"
                echo "PROFILE_AVAILABLE=true"
              } >> "$GITHUB_ENV"
            else
              echo "Warning: IOS_PROVISIONING_PROFILE_BASE64 is invalid base64."
              echo "PROFILE_AVAILABLE=false" >> "$GITHUB_ENV"
            fi
          else
            echo "Warning: IOS_PROVISIONING_PROFILE_BASE64 not set."
            echo "PROFILE_AVAILABLE=false" >> "$GITHUB_ENV"
          fi

      - name: Install certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$CERTIFICATE_BASE64" ]; then
            CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

            if ! printf '%s' "$CERTIFICATE_BASE64" | tr -d '\r\n\t ' | base64 --decode > "$CERTIFICATE_PATH"; then
              echo "Warning: IOS_CERTIFICATE_BASE64 is invalid base64."
              echo "CERT_AVAILABLE=false" >> "$GITHUB_ENV"
              exit 0
            fi

            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

            if security import "$CERTIFICATE_PATH" \
              -P "$CERTIFICATE_PASSWORD" \
              -A -f pkcs12 \
              -k "$KEYCHAIN_PATH"; then
              curl -fsSL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer \
                -o "$RUNNER_TEMP/AppleWWDRCAG3.cer"
              security import "$RUNNER_TEMP/AppleWWDRCAG3.cer" \
                -k "$KEYCHAIN_PATH" 2>/dev/null || true
              security default-keychain -d user -s "$KEYCHAIN_PATH"
              security list-keychain -d user -s "$KEYCHAIN_PATH" "$HOME/Library/Keychains/login.keychain-db"
              security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" 2>/dev/null || true
              if security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -Eq 'Apple Distribution|iPhone Distribution'; then
                echo "CERT_AVAILABLE=true" >> "$GITHUB_ENV"
              else
                echo "Warning: Imported certificate has no usable code-signing identity/private key."
                echo "CERT_AVAILABLE=false" >> "$GITHUB_ENV"
              fi
            else
              echo "Warning: Certificate import failed. Verify IOS_CERTIFICATE_PASSWORD matches the .p12 export password."
              echo "CERT_AVAILABLE=false" >> "$GITHUB_ENV"
            fi
          else
            echo "Warning: IOS_CERTIFICATE_BASE64 not set."
            echo "CERT_AVAILABLE=false" >> "$GITHUB_ENV"
          fi

      - name: Validate iOS signing material (fail fast)
        run: |
          if [ "$CERT_AVAILABLE" != "true" ] || [ "$PROFILE_AVAILABLE" != "true" ]; then
            echo "::error::iOS signing inputs unavailable/invalid. Verify IOS_PROVISIONING_PROFILE_BASE64, IOS_CERTIFICATE_BASE64, and IOS_CERTIFICATE_PASSWORD."
            exit 1
          fi

          if [ -z "$BUNDLE_ID" ] || [ -z "$PROFILE_NAME" ] || [ -z "$TEAM_ID" ]; then
            echo "::error::Provisioning profile metadata missing (BUNDLE_ID/PROFILE_NAME/TEAM_ID)."
            exit 1
          fi

          IDS=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" 2>/dev/null || true)
          echo "$IDS"

          if ! echo "$IDS" | grep -Eq 'Apple Distribution|iPhone Distribution'; then
            echo "::error::No usable code-signing identities found in imported keychain."
            exit 1
          fi

          if ! echo "$IDS" | grep -Eq 'Apple Distribution|iPhone Distribution'; then
            echo "::error::No Apple Distribution certificate found. TestFlight upload requires Apple Distribution certificate. Upload a .p12 that includes an Apple Distribution private key."
            exit 1
          fi

      - name: Build iOS IPA (beta flavour)
        id: build_ipa
        working-directory: ./app
        timeout-minutes: 40
        run: |
          if [ "$CERT_AVAILABLE" = "true" ] && [ "$PROFILE_AVAILABLE" = "true" ]; then
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
              '<plist version="1.0">' \
              '<dict>' \
              '  <key>method</key>' \
              '  <string>app-store</string>' \
              '  <key>signingStyle</key>' \
              '  <string>manual</string>' \
              '  <key>teamID</key>' \
              "  <string>${TEAM_ID}</string>" \
              '  <key>provisioningProfiles</key>' \
              '  <dict>' \
              "    <key>${BUNDLE_ID}</key>" \
              "    <string>${PROFILE_NAME}</string>" \
              '  </dict>' \
              '</dict>' \
              '</plist>' > "$RUNNER_TEMP/ExportOptions.plist"

            # Build Flutter assets without codesigning, then archive/export via xcodebuild
            # using explicit Distribution signing material to avoid Development-cert prechecks.
            flutter build ios --release --no-codesign --no-pub --dart-define=BETA_BUILD=true

            xcodebuild \
              -workspace ios/Runner.xcworkspace \
              -scheme Runner \
              -configuration Release \
              -destination 'generic/platform=iOS' \
              -archivePath build/ios/archive/Runner.xcarchive \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY='Apple Distribution' \
              DEVELOPMENT_TEAM="$TEAM_ID" \
              PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
              PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
              archive

            xcodebuild \
              -exportArchive \
              -archivePath build/ios/archive/Runner.xcarchive \
              -exportPath build/ios/ipa \
              -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

            if [ $? -eq 0 ]; then
              IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
              if [ -z "$IPA_FILE" ]; then
                echo "::error::Signed IPA build completed but no IPA artifact was found in build/ios/ipa."
                exit 1
              fi
              echo "IPA_PATH=app/${IPA_FILE}" >> "$GITHUB_ENV"
              echo "ipa_available=true" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Signed IPA build failed."
              exit 1
            fi
          else
            echo "::error::iOS signing inputs unavailable/invalid. Verify IOS_PROVISIONING_PROFILE_BASE64, IOS_CERTIFICATE_BASE64, and IOS_CERTIFICATE_PASSWORD."
            exit 1
          fi

      - name: Upload IPA to TestFlight
        if: steps.build_ipa.outputs.ipa_available == 'true'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          API_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID" \
            --verbose

          rm -f "$API_KEY_PATH"

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/app-signing.keychain-db" ]; then
            security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db"
          fi
