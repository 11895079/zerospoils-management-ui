name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-unit:
    name: Build and Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies
        working-directory: api
        run: npm install

      - name: Install Worker dependencies
        working-directory: worker
        run: npm install

      - name: Install Frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build API
        working-directory: api
        run: npm run build

      - name: Build Worker
        working-directory: worker
        run: npm run build

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: API unit tests with coverage
        working-directory: api
        run: npx jest src/__tests__/middleware.test.ts src/__tests__/routes.test.ts --coverage

      - name: Frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage -- --run

      - name: Upload API coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: api/coverage
          if-no-files-found: warn

      - name: Upload Frontend coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: warn

  e2e-smoke:
    name: E2E Smoke (Chromium)
    needs: build-and-unit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start local stack
        run: docker compose up -d --build

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3001/health >/dev/null; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "API failed to become healthy"
          exit 1

      - name: Run Playwright smoke tests
        working-directory: frontend
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: warn

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop local stack
        if: always()
        run: docker compose down -v
