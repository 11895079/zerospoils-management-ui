name: Reference Pack Wave A Scaffold

on:
  workflow_dispatch:

jobs:
  generate-wave-a-matrix:
    name: Generate Wave A Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate Wave A job matrix
        id: matrix
        run: |
          python3 scripts/generate_wave_a_reference_pack_jobs.py \
            --matrix-config scripts/reference_pack_wave_a_matrix.json \
            --output-json "$RUNNER_TEMP/wave-a-jobs.json" \
            --output-markdown "$RUNNER_TEMP/wave-a-jobs.md"

          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("$RUNNER_TEMP/wave-a-jobs.json").read_text(encoding="utf-8"))
          matrix = {
            "include": [
              {
                "pack_type": job["pack_type"],
                "region": job["region"],
                "locale": job["locale"] or "default",
                "size_budget_kib": job["size_budget_kib"],
                "artifact_path": job["artifact_path"],
              }
              for job in payload["jobs"]
            ]
          }

          with open("$GITHUB_OUTPUT", "a", encoding="utf-8") as fh:
            fh.write("matrix=" + json.dumps(matrix) + "\n")
          PY

      - name: Upload Wave A scaffold outputs
        uses: actions/upload-artifact@v4
        with:
          name: reference-pack-wave-a-scaffold
          path: |
            ${{ runner.temp }}/wave-a-jobs.json
            ${{ runner.temp }}/wave-a-jobs.md

  validate-wave-a-rows:
    name: Scaffold log (no validation yet) ${{ matrix.pack_type }} / ${{ matrix.region }} / ${{ matrix.locale }}
    runs-on: ubuntu-latest
    needs: generate-wave-a-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-wave-a-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log scaffold row (no validation performed yet)
        run: |
          echo "Scaffold logging only — this job does NOT validate anything yet."
          echo "pack_type=${{ matrix.pack_type }}"
          echo "region=${{ matrix.region }}"
          echo "locale=${{ matrix.locale }}"
          echo "artifact_path=${{ matrix.artifact_path }}"
          echo "size_budget_kib=${{ matrix.size_budget_kib }}"
          echo "TODO: Add artifact existence check"
          echo "TODO: Add schema validation"
          echo "TODO: Add size budget enforcement"