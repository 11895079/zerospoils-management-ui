name: Build Android Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        working-directory: ./app
        run: flutter pub get
      
      - name: Verify version matches tag
        working-directory: ./app
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "Error: pubspec.yaml version ($VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $VERSION"
      
      - name: Run tests
        working-directory: ./app
        run: flutter test
      
      - name: Run analyzer
        working-directory: ./app
        run: flutter analyze
      
      - name: Decode keystore
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/release-keystore.jks
            echo "KEYSTORE_AVAILABLE=true" >> $GITHUB_ENV
          else
            echo "Warning: ANDROID_KEYSTORE_BASE64 secret not set. Build will be unsigned."
            echo "KEYSTORE_AVAILABLE=false" >> $GITHUB_ENV
          fi
      
      - name: Build APK
        working-directory: ./app
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ "${{ env.KEYSTORE_AVAILABLE }}" = "true" ]; then
            flutter build apk --release \
              --android-signing-key=/tmp/release-keystore.jks \
              --android-signing-key-pass=$KEYSTORE_PASSWORD \
              --android-signing-key-alias=$KEY_ALIAS \
              --android-signing-key-alias-pass=$KEY_PASSWORD
          else
            flutter build apk --release
          fi
      
      - name: Build App Bundle
        working-directory: ./app
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ "${{ env.KEYSTORE_AVAILABLE }}" = "true" ]; then
            flutter build appbundle --release \
              --android-signing-key=/tmp/release-keystore.jks \
              --android-signing-key-pass=$KEYSTORE_PASSWORD \
              --android-signing-key-alias=$KEY_ALIAS \
              --android-signing-key-alias-pass=$KEY_PASSWORD
          else
            flutter build appbundle --release
          fi
      
      - name: Rename artifacts
        working-directory: ./app
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/zerospoils-$TAG_VERSION.apk
          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/zerospoils-$TAG_VERSION.aab
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.ref_name }}
          path: app/build/app/outputs/flutter-apk/zerospoils-*.apk
          retention-days: 90
      
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.ref_name }}
          path: app/build/app/outputs/bundle/release/zerospoils-*.aab
          retention-days: 90
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            app/build/app/outputs/flutter-apk/zerospoils-*.apk
            app/build/app/outputs/bundle/release/zerospoils-*.aab
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
