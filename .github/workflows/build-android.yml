name: Build Android Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    # Skip beta tags (v*-b*) — those are handled by distribute-beta.yml
    if: ${{ !contains(github.ref_name, '-b') }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        working-directory: ./app
        run: flutter pub get
      
      - name: Verify version matches tag
        working-directory: ./app
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "Error: pubspec.yaml version ($VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $VERSION"
      
      - name: Run tests
        working-directory: ./app
        run: flutter test
      
      - name: Run analyzer
        working-directory: ./app
        run: flutter analyze
      
      - name: Decode keystore
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            if printf '%s' "$KEYSTORE_BASE64" | tr -d '\r\n\t ' | base64 --decode > /tmp/release-keystore.jks; then
              echo "KEYSTORE_AVAILABLE=true" >> "$GITHUB_ENV"
            else
              echo "Warning: ANDROID_KEYSTORE_BASE64 is invalid base64. Falling back to debug signing."
              echo "KEYSTORE_AVAILABLE=false" >> "$GITHUB_ENV"
            fi
          else
            echo "Warning: ANDROID_KEYSTORE_BASE64 secret not set. Build will be unsigned."
            echo "KEYSTORE_AVAILABLE=false" >> "$GITHUB_ENV"
          fi

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ "$KEYSTORE_AVAILABLE" != "true" ]; then
            echo "Warning: Missing or invalid ANDROID_KEYSTORE_BASE64. Falling back to debug signing."
            echo "SIGNING_STATUS=missing_keystore" >> "$GITHUB_ENV"
            echo "SIGNING_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Warning: One or more Android signing secrets are empty. Falling back to debug signing."
            echo "SIGNING_STATUS=missing_secret" >> "$GITHUB_ENV"
            echo "SIGNING_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if ! keytool -list -keystore /tmp/release-keystore.jks -storepass "$KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "Warning: Keystore password is invalid. Falling back to debug signing."
            echo "SIGNING_STATUS=bad_store_password" >> "$GITHUB_ENV"
            echo "SIGNING_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if ! keytool -list -keystore /tmp/release-keystore.jks -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null 2>&1; then
            echo "Warning: Keystore alias is invalid. Falling back to debug signing."
            echo "SIGNING_STATUS=bad_alias" >> "$GITHUB_ENV"
            echo "SIGNING_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi

          printf '%s\n' \
            "storeFile=/tmp/release-keystore.jks" \
            "storePassword=${KEYSTORE_PASSWORD}" \
            "keyAlias=${KEY_ALIAS}" \
            "keyPassword=${KEY_PASSWORD}" \
            > app/android/key.properties
          echo "SIGNING_STATUS=ready" >> "$GITHUB_ENV"
          echo "SIGNING_READY=true" >> "$GITHUB_ENV"

      - name: Build APK
        working-directory: ./app
        run: |
          if [ "$SIGNING_READY" = "true" ]; then
            flutter build apk --release
          else
            flutter build apk --release -PALLOW_DEBUG_SIGNING_FOR_RELEASE=true
          fi

      - name: Build App Bundle
        working-directory: ./app
        run: |
          if [ "$SIGNING_READY" = "true" ]; then
            flutter build appbundle --release
          else
            flutter build appbundle --release -PALLOW_DEBUG_SIGNING_FOR_RELEASE=true
          fi
      
      - name: Rename artifacts
        working-directory: ./app
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          mv build/app/outputs/flutter-apk/app-release.apk \
           "build/app/outputs/flutter-apk/zerospoils-${TAG_VERSION}.apk"
          mv build/app/outputs/bundle/release/app-release.aab \
           "build/app/outputs/bundle/release/zerospoils-${TAG_VERSION}.aab"
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.ref_name }}
          path: app/build/app/outputs/flutter-apk/zerospoils-*.apk
          retention-days: 90
      
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.ref_name }}
          path: app/build/app/outputs/bundle/release/zerospoils-*.aab
          retention-days: 90
