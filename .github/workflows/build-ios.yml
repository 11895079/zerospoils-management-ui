name: Build iOS Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        working-directory: ./app
        run: flutter pub get
      
      - name: Verify version matches tag
        working-directory: ./app
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "Error: pubspec.yaml version ($VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $VERSION"
      
      - name: Run tests
        working-directory: ./app
        run: flutter test
      
      - name: Run analyzer
        working-directory: ./app
        run: flutter analyze
      
      - name: Install provisioning profile
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -n "$PROVISIONING_PROFILE_BASE64" ]; then
            PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
            if printf '%s' "$PROVISIONING_PROFILE_BASE64" | tr -d '\r\n\t ' | base64 --decode > "$PP_PATH"; then
              mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
              cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/
              echo "PROFILE_AVAILABLE=true" >> "$GITHUB_ENV"
              echo "Provisioning profile installed"
            else
              echo "Warning: IOS_PROVISIONING_PROFILE_BASE64 is invalid base64."
              echo "PROFILE_AVAILABLE=false" >> "$GITHUB_ENV"
            fi
          else
            echo "Warning: IOS_PROVISIONING_PROFILE_BASE64 secret not set. Build may fail."
            echo "PROFILE_AVAILABLE=false" >> "$GITHUB_ENV"
          fi
      
      - name: Install certificate
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$CERTIFICATE_BASE64" ]; then
            CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
            
            # Decode certificate
            if ! printf '%s' "$CERTIFICATE_BASE64" | tr -d '\r\n\t ' | base64 --decode > "$CERTIFICATE_PATH"; then
              echo "Warning: IOS_CERTIFICATE_BASE64 is invalid base64."
              echo "CERT_AVAILABLE=false" >> "$GITHUB_ENV"
              exit 0
            fi
            
            # Create temporary keychain
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            
            # Import certificate
            if security import "$CERTIFICATE_PATH" \
              -P "$CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 \
              -k "$KEYCHAIN_PATH"; then
              security list-keychain -d user -s "$KEYCHAIN_PATH"
              if security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -Eq 'Apple Distribution|iPhone Distribution'; then
                echo "CERT_AVAILABLE=true" >> "$GITHUB_ENV"
                echo "Certificate installed in keychain"
              else
                echo "Warning: Imported certificate has no usable code-signing identity/private key."
                echo "CERT_AVAILABLE=false" >> "$GITHUB_ENV"
              fi
            else
              echo "Warning: Certificate import failed. Verify IOS_CERTIFICATE_PASSWORD matches the .p12 export password."
              echo "CERT_AVAILABLE=false" >> "$GITHUB_ENV"
            fi
            
          else
            echo "Warning: IOS_CERTIFICATE_BASE64 secret not set. Build may fail."
            echo "CERT_AVAILABLE=false" >> "$GITHUB_ENV"
          fi
      
      - name: Build iOS IPA
        id: build_ipa
        working-directory: ./app
        run: |
          if [ "$CERT_AVAILABLE" = "true" ] && [ "$PROFILE_AVAILABLE" = "true" ]; then
            if flutter build ipa --release; then
              IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
              echo "IPA_PATH=app/${IPA_FILE}" >> "$GITHUB_ENV"
              echo "ipa_available=true" >> "$GITHUB_OUTPUT"
            else
              echo "Warning: Signed IPA build failed; falling back to unsigned iOS build."
              flutter build ios --release --no-codesign
              echo "ipa_available=false" >> "$GITHUB_OUTPUT"
            fi
          else
            flutter build ios --release --no-codesign
            echo "Warning: iOS signing inputs unavailable/invalid; built unsigned app only."
            echo "ipa_available=false" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Upload IPA artifact
        if: steps.build_ipa.outputs.ipa_available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.ref_name }}
          path: ${{ env.IPA_PATH }}
          retention-days: 90
          if-no-files-found: warn
      
      - name: Cleanup keychain
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/app-signing.keychain-db" ]; then
            security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db"
          fi
