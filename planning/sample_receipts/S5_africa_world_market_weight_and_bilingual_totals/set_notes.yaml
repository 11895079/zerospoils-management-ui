set_id: "S5_africa_world_market_weight_and_bilingual_totals"
summary: "Independent-store receipt with weighted produce line and bilingual total labels."
machine_readable_reference: "receipt_reference.json"
essential_extraction:
  - "merchant/date/time/transaction metadata"
  - "item lines and weighted line association (kg @ $/kg)"
  - "Net Sales/TOTAL SALES/SOUS-TOTAL and paid amount"
noise_to_exclude:
  - "vendor/staff prefixes and POS identifiers"
  - "masked account fragments"
structured_reference_contains:
  - "items with listed_price, discount, and net_price"
  - "weighted produce linkage fields such as weight_kg and price_per_kg"
  - "summary details including bilingual total labels mapped to canonical fields"
