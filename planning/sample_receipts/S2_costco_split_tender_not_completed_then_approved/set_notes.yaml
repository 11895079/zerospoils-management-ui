set_id: "S2_costco_split_tender_not_completed_then_approved"
summary: "Costco split-tender flow showing not-completed then approved status blocks."
machine_readable_reference: "receipt_reference.json"
essential_extraction:
  - "item lines and summary totals"
  - "payment status transition markers"
  - "multiple tender blocks (Visa/MasterCard references)"
noise_to_exclude:
  - "intermediate declined/not-completed payment sections"
  - "duplicate payment reference lines"
structured_reference_contains:
  - "items with code, listed_price, discount, and net_price"
  - "final payment summary separated from intermediate tender failures"
  - "summary details including subtotal, tax, and total"
